<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Creatina"/>
<meta name="theme-color" content="#0D0D0F"/>
<link rel="manifest" href="manifest.json"/>
<title>Creatina</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@500;600&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0D0F;--bg2:#141417;--bg3:#1C1C21;
  --border:rgba(255,255,255,.07);--border-hi:rgba(255,255,255,.14);
  --text:#F0F0F5;--text-mid:#7A7A8A;--text-soft:#3A3A45;
  --cyan:#00E5FF;--cyan-dim:rgba(0,229,255,.1);--cyan-glow:rgba(0,229,255,.3);
  --lime:#B8FF00;--lime-glow:rgba(184,255,0,.3);
  --red:#FF3B5C;--red-dim:rgba(255,59,92,.1);
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);}
body{display:flex;justify-content:center;min-height:100vh;overflow-x:hidden;}
#app{width:100%;max-width:400px;min-height:100vh;display:flex;flex-direction:column;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:52px 28px 0;}
.topbar-title{font-size:12px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--text-mid);}
.settings-btn{width:36px;height:36px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-mid);font-size:18px;line-height:1;}

.info-card{margin:20px 20px 0;background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.15);border-radius:16px;padding:16px 18px;}
.info-title{font-size:13px;font-weight:600;color:var(--cyan);margin-bottom:6px;}
.info-text{font-size:12px;color:var(--text-mid);line-height:1.7;}

.perm-card{margin:20px 20px 0;background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.15);border-radius:16px;padding:18px;display:flex;gap:14px;align-items:flex-start;}
.perm-icon{font-size:22px;flex-shrink:0;margin-top:2px;}
.perm-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;}
.perm-sub{font-size:12px;color:var(--text-mid);line-height:1.5;margin-bottom:12px;}
.perm-btn{padding:8px 18px;background:var(--cyan);color:#000;border:none;border-radius:8px;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;}

.alert-banner{margin:20px 20px 0;background:rgba(255,59,92,.07);border:1px solid rgba(255,59,92,.2);border-radius:14px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;}
.alert-dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:5px;animation:pdot 1.5s infinite;}
@keyframes pdot{0%,100%{opacity:.4}50%{opacity:1}}
.alert-text{font-size:13px;color:var(--text);line-height:1.5;}
.alert-text strong{color:var(--red);}

/* MAIN */
.main-card{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 28px 16px;text-align:center;}
.streak-label{font-size:11px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--text-mid);margin-bottom:20px;}

/* STREAK DISPLAY - canvas based, no font dependency */
.streak-display{position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:8px;}
.streak-canvas-wrap{position:relative;z-index:1;}
#streak-canvas{display:block;}
.glow-behind{position:absolute;border-radius:50%;pointer-events:none;z-index:0;}
.glow-pending{animation:pglw 2.4s ease-in-out infinite;}
.glow-done{}
.glow-broken{}
@keyframes pglw{0%,100%{opacity:.6;transform:scale(.85)}50%{opacity:1;transform:scale(1.08)}}

.streak-unit{font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;margin-top:6px;}

.status-line{font-size:15px;color:var(--text-mid);margin:16px 0 6px;line-height:1.5;}
.status-line strong{color:var(--text);font-weight:600;}
.next-notif-wrap{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px;}
.notif-pulse{width:6px;height:6px;border-radius:50%;background:var(--cyan);animation:pdot 2s infinite;}
.next-notif{font-family:var(--mono);font-size:11px;color:var(--text-soft);letter-spacing:.06em;}

.cta-wrap{margin-top:28px;width:100%;}
.cta-btn{width:100%;padding:20px;border:none;border-radius:16px;font-family:var(--font);font-size:16px;font-weight:700;letter-spacing:.04em;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s;-webkit-tap-highlight-color:transparent;}
.cta-pending{background:var(--cyan);color:#000;}
.cta-pending:active{transform:scale(.97);}
.cta-done{background:var(--bg3);color:var(--lime);border:1px solid rgba(184,255,0,.15);cursor:default;}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);transform:scale(0);animation:rpl .6s ease-out;pointer-events:none;}
@keyframes rpl{to{transform:scale(4);opacity:0}}
.check-anim{display:inline-block;animation:chk .4s cubic-bezier(.4,0,.2,1);}
@keyframes chk{0%{transform:scale(0) rotate(-20deg)}70%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
.particle{position:fixed;border-radius:50%;pointer-events:none;animation:pfx .8s ease-out forwards;}
@keyframes pfx{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}

/* STATS */
.bottom-stats{padding:12px 28px 44px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;}
.stat-lbl{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text-soft);margin-bottom:6px;}
.stat-val{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--text);}
.stat-val.c-cyan{color:var(--cyan);}
.stat-val.c-lime{color:var(--lime);}

/* PANEL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:50;opacity:0;transition:opacity .3s;pointer-events:none;}
.overlay.open{opacity:1;pointer-events:all;}
.panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:400px;background:var(--bg2);border-radius:24px 24px 0 0;border-top:1px solid var(--border-hi);z-index:51;transition:transform .35s cubic-bezier(.4,0,.2,1);padding-bottom:max(24px,env(safe-area-inset-bottom));}
.panel.open{transform:translateX(-50%) translateY(0);}
.panel-handle{width:36px;height:4px;border-radius:2px;background:var(--border-hi);margin:12px auto 0;}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 8px;}
.panel-title{font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.panel-close{background:none;border:none;color:var(--text-mid);cursor:pointer;font-size:22px;line-height:1;padding:4px;}
.panel-body{padding:8px 24px 16px;display:flex;flex-direction:column;gap:18px;}
.field-row{display:flex;flex-direction:column;gap:8px;}
.field-lbl{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text-mid);}
.field-input{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-family:var(--font);font-size:15px;color:var(--text);outline:none;width:100%;-webkit-appearance:none;appearance:none;transition:border-color .2s;}
.field-input:focus{border-color:var(--cyan);}
.chip-row{display:flex;gap:8px;}
.dose-chip{padding:9px 18px;border-radius:40px;border:1px solid var(--border);background:var(--bg3);color:var(--text-mid);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;}
.dose-chip.active{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-dim);}
.info-row{background:var(--bg3);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--text-mid);line-height:1.6;border:1px solid var(--border);}
.info-row strong{color:var(--cyan);}
.save-btn{width:100%;padding:16px;background:var(--cyan);color:#000;border:none;border-radius:12px;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;}
.save-btn:active{transform:scale(.98);}

#toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#1C1C21;color:#F0F0F5;padding:10px 20px;border-radius:40px;font-size:13px;font-weight:500;font-family:'Syne',sans-serif;border:1px solid rgba(255,255,255,.1);z-index:999;transition:opacity .3s;opacity:0;pointer-events:none;white-space:nowrap;}
::-webkit-scrollbar{width:0;}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script>

/* =============================================
   CANVAS NUMBER RENDERER
   Draws the streak number onto a <canvas> so it
   never depends on an external font loading.
   ============================================= */
function drawStreakNumber(streak, colorHex) {
  var SIZE = 200;
  var c = document.getElementById('streak-canvas');
  if (!c) return;
  c.width = SIZE;
  c.height = SIZE;
  var ctx = c.getContext('2d');
  ctx.clearRect(0, 0, SIZE, SIZE);

  var str = String(streak);
  /* Pick font size based on digit count */
  var fontSize = str.length === 1 ? 130 : str.length === 2 ? 100 : 72;

  ctx.fillStyle = colorHex;
  ctx.font = 'bold ' + fontSize + 'px -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(str, SIZE / 2, SIZE / 2 + 4);
}

function drawGlow(colorHex, animated) {
  var wrap = document.getElementById('glow-behind');
  if (!wrap) return;
  var SIZE = 200;
  wrap.style.width = SIZE + 'px';
  wrap.style.height = SIZE + 'px';
  /* Use a radial gradient as box-shadow approximation */
  wrap.style.background = 'radial-gradient(circle, ' + colorHex + '44 0%, transparent 70%)';
}

/* ============= DAY KEY (resets at 05:00) ============= */
function getDayKey() {
  var now = new Date();
  var adj = new Date(now.getTime() - 5 * 60 * 60 * 1000);
  return adj.toISOString().slice(0, 10);
}

function getNextResetMs() {
  var now = new Date();
  var next5 = new Date();
  next5.setHours(5, 0, 0, 0);
  if (next5.getTime() <= now.getTime()) next5.setDate(next5.getDate() + 1);
  return next5.getTime() - now.getTime();
}

function getNextHourMs() {
  var now = new Date();
  var next = new Date();
  next.setHours(now.getHours() + 1, 0, 0, 0);
  return next.getTime() - now.getTime();
}

function fmtTime(d) {
  var h = d.getHours(), m = d.getMinutes();
  return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
}

function fmtNextHour() {
  var now = new Date();
  var next = new Date();
  next.setHours(now.getHours() + 1, 0, 0, 0);
  return fmtTime(next);
}

/* ============= STATE ============= */
var DEFAULT_CONFIG = {dose:'5g', name:''};
var config = {dose:'5g', name:''};
var todayData = null;
var streak = 0;
var panelOpen = false;
var toastTimer = null;
var hourlyTimer = null;
var resetTimer = null;

/* ============= STORAGE ============= */
function loadAll() {
  try { var c = localStorage.getItem('creatina:config'); if (c) config = Object.assign({}, DEFAULT_CONFIG, JSON.parse(c)); } catch(e) {}
  try { var t = localStorage.getItem('creatina:today'); if (t) todayData = JSON.parse(t); } catch(e) {}
  try { var s = localStorage.getItem('creatina:streak'); if (s) streak = parseInt(s, 10) || 0; } catch(e) {}
  if (todayData && todayData.dayKey !== getDayKey()) todayData = null;
}

function saveConfig() { try { localStorage.setItem('creatina:config', JSON.stringify(config)); } catch(e) {} }
function saveTodayData() { try { localStorage.setItem('creatina:today', JSON.stringify(todayData)); } catch(e) {} }
function saveStreak() {
  try {
    localStorage.setItem('creatina:streak', String(streak));
    localStorage.setItem('creatina:lastDayKey', getDayKey());
  } catch(e) {}
}

/* Seed streak to 70 if never set before (user already has 70 days) */
function seedStreakIfNew() {
  var existing = localStorage.getItem('creatina:streak');
  if (existing === null) {
    streak = 70;
    var yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
    var adjY = new Date(yesterday.getTime() - 5 * 60 * 60 * 1000);
    var yKey = adjY.toISOString().slice(0, 10);
    try {
      localStorage.setItem('creatina:streak', '70');
      localStorage.setItem('creatina:lastDayKey', yKey);
      localStorage.setItem('creatina:best', '70');
    } catch(e) {}
  }
}

/* ============= STREAK LOGIC ============= */
function isTakenToday() {
  return todayData !== null && todayData.dayKey === getDayKey() && todayData.taken === true;
}

function updateStreak() {
  var last = localStorage.getItem('creatina:lastDayKey');
  if (!last || last === getDayKey()) return;
  var yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
  var adjY = new Date(yesterday.getTime() - 5 * 60 * 60 * 1000);
  var yKey = adjY.toISOString().slice(0, 10);
  if (last !== yKey) { streak = 0; saveStreak(); }
}

function getStreakState() {
  if (isTakenToday()) return 'done';
  var last = localStorage.getItem('creatina:lastDayKey');
  if (!last || streak === 0) return 'pending';
  var yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
  var adjY = new Date(yesterday.getTime() - 5 * 60 * 60 * 1000);
  var yKey = adjY.toISOString().slice(0, 10);
  if (last !== getDayKey() && last !== yKey) return 'broken';
  return 'pending';
}

function getWeekCount() {
  var count = 0;
  for (var i = 0; i < 7; i++) {
    var d = new Date(); d.setDate(d.getDate() - i);
    var adj = new Date(d.getTime() - 5 * 60 * 60 * 1000);
    if (localStorage.getItem('creatina:day:' + adj.toISOString().slice(0, 10)) === '1') count++;
  }
  return count;
}

function getBestStreak() {
  try { return parseInt(localStorage.getItem('creatina:best') || '0', 10) || 0; } catch(e) { return 0; }
}

/* ============= NOTIFICATIONS ============= */
function notifSupported() { return 'Notification' in window; }
function notifGranted() { return notifSupported() && Notification.permission === 'granted'; }

function requestPermission() {
  if (!notifSupported()) return;
  var result = Notification.requestPermission(function(perm) {
    renderUI();
    if (perm === 'granted') { scheduleHourly(); showToast('Notificaciones activadas!'); }
  });
  if (result && result.then) {
    result.then(function(perm) {
      renderUI();
      if (perm === 'granted') { scheduleHourly(); showToast('Notificaciones activadas!'); }
    });
  }
}

function fireNotif(title, body, tag) {
  if (!notifGranted()) return;
  try {
    var n = new Notification(title, {body:body, tag:tag||'creatina', renotify:true, requireInteraction:true});
    n.onclick = function() { window.focus(); n.close(); markAsTaken(); };
  } catch(e) {}
}

function scheduleHourly() {
  clearTimeout(hourlyTimer);
  clearTimeout(resetTimer);
  if (!notifGranted() || isTakenToday()) return;

  var msToNext = getNextHourMs();
  hourlyTimer = setTimeout(function() {
    loadAll();
    if (!isTakenToday()) {
      fireNotif(
        'Creatina pendiente',
        'Son las ' + fmtTime(new Date()) + '. Racha: ' + streak + ' dias. No la rompas!',
        'creatina-hourly'
      );
      scheduleHourly(); /* chain next hour */
    }
  }, msToNext);

  /* Reset at 05:00 */
  var msToReset = getNextResetMs();
  resetTimer = setTimeout(function() {
    loadAll(); updateStreak(); renderUI(); scheduleHourly();
  }, msToReset);
}

function checkOnOpen() {
  if (!notifGranted() || isTakenToday()) return;
  setTimeout(function() {
    if (!isTakenToday()) {
      fireNotif('Creatina pendiente', 'No olvidaste tomar tu creatina hoy. Racha: ' + streak + ' dias.', 'creatina-open');
    }
  }, 1200);
}

/* ============= MARK TAKEN ============= */
function markAsTaken() {
  if (isTakenToday()) return;
  var now = new Date();
  todayData = {dayKey: getDayKey(), time: fmtTime(now), taken: true};
  var last = localStorage.getItem('creatina:lastDayKey');
  var yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
  var adjY = new Date(yesterday.getTime() - 5 * 60 * 60 * 1000);
  var yKey = adjY.toISOString().slice(0, 10);
  streak = (last === yKey || last === getDayKey()) ? streak + 1 : 1;
  var best = getBestStreak();
  if (streak > best) { try { localStorage.setItem('creatina:best', String(streak)); } catch(e) {} }
  try { localStorage.setItem('creatina:day:' + getDayKey(), '1'); } catch(e) {}
  saveTodayData(); saveStreak();
  clearTimeout(hourlyTimer);
  renderUI(); spawnParticles();
  showToast('+' + config.dose + ' registrado! Racha: ' + streak);
}

/* ============= UI HELPERS ============= */
function showToast(msg) {
  var t = document.getElementById('toast'); if (!t) return;
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.style.opacity = '0'; }, 2800);
}

function addRipple(e, el) {
  var r = document.createElement('div'); r.className = 'ripple';
  var rect = el.getBoundingClientRect();
  var size = Math.max(rect.width, rect.height) * 2;
  r.style.width = size + 'px'; r.style.height = size + 'px';
  r.style.left = (e.clientX - rect.left - size/2) + 'px';
  r.style.top = (e.clientY - rect.top - size/2) + 'px';
  el.appendChild(r);
  r.addEventListener('animationend', function() { if (r.parentNode) r.parentNode.removeChild(r); });
}

function spawnParticles() {
  var btn = document.getElementById('cta-btn'); if (!btn) return;
  var rect = btn.getBoundingClientRect();
  var cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
  var colors = ['#B8FF00','#00E5FF','#FFFFFF'];
  for (var i = 0; i < 20; i++) {
    var p = document.createElement('div'); p.className = 'particle';
    var angle = (Math.PI*2*i)/20 + (Math.random()-.5)*.5;
    var dist = 60 + Math.random()*90, sz = 4 + Math.random()*6;
    p.style.left = cx+'px'; p.style.top = cy+'px';
    p.style.width = sz+'px'; p.style.height = sz+'px';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.setProperty('--tx', Math.cos(angle)*dist+'px');
    p.style.setProperty('--ty', Math.sin(angle)*dist+'px');
    p.style.zIndex = '999';
    document.body.appendChild(p);
    p.addEventListener('animationend', function() { if (this.parentNode) this.parentNode.removeChild(this); });
  }
}

function handleCtaClick(e) {
  var btn = document.getElementById('cta-btn');
  if (btn) addRipple(e, btn);
  setTimeout(markAsTaken, 80);
}

/* ============= SETTINGS ============= */
function openPanel() { panelOpen = true; renderUI(); }
function closePanel() { panelOpen = false; renderUI(); }

function setDose(d) {
  config.dose = d;
  var chips = document.querySelectorAll('.dose-chip');
  for (var i = 0; i < chips.length; i++) {
    chips[i].className = 'dose-chip' + (chips[i].getAttribute('data-dose') === d ? ' active' : '');
  }
}

function applySettings() {
  var nEl = document.getElementById('cfg-name');
  if (nEl) config.name = nEl.value;
  saveConfig(); closePanel(); showToast('Guardado!');
}

/* ============= BUILD HTML ============= */
function buildPanel() {
  var chips = '';
  var doses = ['3g','5g','10g'];
  for (var i = 0; i < doses.length; i++) {
    var d = doses[i];
    chips += '<button class="dose-chip' + (config.dose===d?' active':'') + '" data-dose="' + d + '" onclick="setDose(\'' + d + '\')">' + d + '</button>';
  }
  return '<div class="overlay' + (panelOpen?' open':'') + '" onclick="closePanel()"></div>' +
    '<div class="panel' + (panelOpen?' open':'') + '">' +
      '<div class="panel-handle"></div>' +
      '<div class="panel-head"><div class="panel-title">Configuracion</div>' +
      '<button class="panel-close" onclick="closePanel()">&#x2715;</button></div>' +
      '<div class="panel-body">' +
        '<div class="field-row"><label class="field-lbl">Tu nombre</label>' +
        '<input id="cfg-name" class="field-input" placeholder="Opcional" value="' + config.name + '" /></div>' +
        '<div class="field-row"><label class="field-lbl">Dosis diaria</label>' +
        '<div class="chip-row">' + chips + '</div></div>' +
        '<div class="info-row"><strong>Notificaciones:</strong> cada hora mientras no hayas marcado la creatina. El dia se reinicia a las <strong>5:00am</strong>.</div>' +
        '<button class="save-btn" onclick="applySettings()">Guardar</button>' +
      '</div></div>';
}

function buildBanners() {
  var html = '';
  var state = getStreakState();
  if (state === 'broken') {
    html += '<div class="alert-banner"><div class="alert-dot"></div>' +
      '<div class="alert-text">Racha <strong>rota</strong>. Hoy empiezas de nuevo.</div></div>';
  }
  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var isStandalone = window.navigator.standalone === true;
  if (isIOS && !isStandalone) {
    html += '<div class="info-card">' +
      '<div class="info-title">Instalar para notificaciones</div>' +
      '<div class="info-text">Toca el icono compartir &#9650; en Safari &rarr; <strong style="color:var(--cyan)">Anadir a pantalla de inicio</strong> &rarr; abre desde ese icono.</div></div>';
  }
  if (notifSupported() && !notifGranted() && Notification.permission !== 'denied') {
    html += '<div class="perm-card"><div class="perm-icon">\uD83D\uDD14</div><div>' +
      '<div class="perm-title">Activar recordatorios</div>' +
      '<div class="perm-sub">Notificacion cada hora hasta que marques la creatina.</div>' +
      '<button class="perm-btn" onclick="requestPermission()">Activar</button>' +
      '</div></div>';
  }
  return html;
}

function buildMain() {
  var state = getStreakState();
  var color = state==='done' ? '#B8FF00' : state==='broken' ? '#FF3B5C' : '#00E5FF';
  var unit = streak===1 ? 'DIA SEGUIDO' : 'DIAS SEGUIDOS';
  var label = state==='broken' ? 'RACHA ROTA' : 'RACHA ACTUAL';
  var glowClass = 'glow-behind glow-' + state;

  var statusLine = '';
  if (state === 'done') {
    var t = todayData && todayData.time ? todayData.time : '--:--';
    statusLine = '<div class="status-line">Registrado hoy a las <strong>' + t + '</strong></div>';
  } else {
    var nameStr = config.name ? ', ' + config.name : '';
    statusLine = '<div class="status-line">Hoy aun no' + nameStr + '. ' + config.dose + ' te esperan.</div>';
  }

  var nextLine = '';
  if (notifGranted() && !isTakenToday()) {
    nextLine = '<div class="next-notif-wrap"><div class="notif-pulse"></div>' +
      '<div class="next-notif">prox. aviso a las ' + fmtNextHour() + '</div></div>';
  }

  var ctaBtn = state==='done'
    ? '<button class="cta-btn cta-done" id="cta-btn"><span class="check-anim">&#10003;</span> Tomada hoy</button>'
    : '<button class="cta-btn cta-pending" id="cta-btn" onclick="handleCtaClick(event)">Marcar como tomada</button>';

  /* We render the number via canvas AFTER innerHTML is set, in a setTimeout */
  window._pendingCanvasColor = color;

  return '<div class="main-card">' +
    '<div class="streak-label">' + label + '</div>' +
    '<div class="streak-display">' +
      '<div id="glow-behind" class="' + glowClass + '" style="background:radial-gradient(circle,' + color + '44 0%,transparent 70%);width:220px;height:220px;position:absolute;border-radius:50%;"></div>' +
      '<div class="streak-canvas-wrap"><canvas id="streak-canvas" width="200" height="200"></canvas></div>' +
    '</div>' +
    '<div class="streak-unit" style="color:' + color + '">' + unit + '</div>' +
    statusLine + nextLine +
    '<div class="cta-wrap">' + ctaBtn + '</div>' +
  '</div>';
}

function buildStats() {
  var taken = isTakenToday();
  var week = getWeekCount();
  var best = Math.max(getBestStreak(), streak);
  var todayVal = taken ? ('&#10003; ' + config.dose) : 'Pendiente';
  var todayClass = taken ? 'stat-val c-lime' : 'stat-val c-cyan';
  return '<div class="bottom-stats">' +
    '<div class="stat-box"><div class="stat-lbl">Hoy</div><div class="' + todayClass + '">' + todayVal + '</div></div>' +
    '<div class="stat-box"><div class="stat-lbl">Reset</div><div class="stat-val" style="font-size:14px">5:00am</div></div>' +
    '<div class="stat-box"><div class="stat-lbl">Esta semana</div><div class="stat-val c-cyan">' + week + '/7</div></div>' +
    '<div class="stat-box"><div class="stat-lbl">Mejor racha</div><div class="stat-val">' + best + '</div></div>' +
  '</div>';
}

function renderUI() {
  var app = document.getElementById('app'); if (!app) return;
  var state = getStreakState();
  var color = state==='done' ? '#B8FF00' : state==='broken' ? '#FF3B5C' : '#00E5FF';

  app.innerHTML =
    buildPanel() +
    '<div class="topbar">' +
      '<div class="topbar-title">Creatina</div>' +
      '<button class="settings-btn" onclick="openPanel()">&#9881;</button>' +
    '</div>' +
    '<div>' + buildBanners() + '</div>' +
    buildMain() +
    buildStats();

  /* Draw canvas after DOM is ready */
  setTimeout(function() { drawStreakNumber(streak, color); }, 0);
}

/* ============= GLOBALS ============= */
window.handleCtaClick = handleCtaClick;
window.markAsTaken = markAsTaken;
window.requestPermission = requestPermission;
window.openPanel = openPanel;
window.closePanel = closePanel;
window.applySettings = applySettings;
window.setDose = setDose;

/* ============= BOOT ============= */
seedStreakIfNew();
loadAll();
updateStreak();
renderUI();
scheduleHourly();
checkOnOpen();

setInterval(function() {
  if (!panelOpen) { loadAll(); renderUI(); }
}, 60000);

document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') {
    loadAll(); updateStreak(); renderUI(); checkOnOpen();
  }
});
</script>
</body>
</html>
